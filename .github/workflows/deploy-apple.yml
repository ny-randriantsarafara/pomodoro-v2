name: Deploy Apple

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'macos/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'assets/**'
      - 'fastlane/**'
      - 'Gemfile'
      - 'Gemfile.lock'

permissions:
  contents: write

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  version:
    name: Bump version & tag
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      skipped: ${{ steps.guard.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get commit message
        id: commit
        shell: bash
        run: |
          MSG=$(git log -1 --format='%s' HEAD)
          BODY=$(git log -1 --format='%b' HEAD)
          echo "message=$MSG" >> "$GITHUB_OUTPUT"
          echo "body<<BODY_DELIMITER_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "BODY_DELIMITER_EOF" >> "$GITHUB_OUTPUT"

      - name: Determine bump level
        id: bump
        shell: bash
        env:
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
          COMMIT_BODY: ${{ steps.commit.outputs.body }}
        run: |
          if echo "$COMMIT_BODY" | grep -qi "BREAKING CHANGE"; then
            echo "level=major" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TYPE=$(echo "$COMMIT_MSG" | sed -En 's/^([a-z]+)(\([^)]*\))?!?:.*/\1/p')
          BANG=$(echo "$COMMIT_MSG" | sed -En 's/^[a-z]+(\([^)]*\))?(!)?.*/\2/p')

          if [[ "$BANG" == "!" ]]; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif [[ "$TYPE" == "feat" ]]; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new version
        id: version
        shell: bash
        env:
          BUMP_LEVEL: ${{ steps.bump.outputs.level }}
        run: |
          if LATEST=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null); then
            echo "Found latest tag: $LATEST"
          else
            LATEST="v1.0.0"
            echo "No tags found, using baseline: $LATEST"
          fi

          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$BUMP_LEVEL" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "::error::Unknown bump level: '$BUMP_LEVEL'. Defaulting to patch."
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP_LEVEL — $LATEST -> $NEW_TAG"

      - name: Guard duplicate tag
        id: guard
        shell: bash
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "HEAD is already tagged. Skipping release."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.guard.outputs.skipped != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          git tag -a "$NEW_TAG" HEAD -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --generate-notes

  deploy-ios:
    name: Deploy iOS to TestFlight
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        env:
          NEW_TAG: ${{ needs.version.outputs.new_tag }}
        run: echo "FLUTTER_BUILD_NAME=${NEW_TAG#v}" >> "$GITHUB_ENV"

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup
        run: make setup

      - name: Write .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env

      - name: Setup SSH key for Match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Sync signing
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: make sync-signing

      - name: Deploy to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FLUTTER_BUILD_NAME: ${{ env.FLUTTER_BUILD_NAME }}
        run: make deploy-testflight

  deploy-macos:
    name: Deploy macOS to TestFlight
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        env:
          NEW_TAG: ${{ needs.version.outputs.new_tag }}
        run: echo "FLUTTER_BUILD_NAME=${NEW_TAG#v}" >> "$GITHUB_ENV"

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup
        run: make setup

      - name: Write .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env

      - name: Setup SSH key for Match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Deploy macOS to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FLUTTER_BUILD_NAME: ${{ env.FLUTTER_BUILD_NAME }}
        run: make deploy-macos-testflight
