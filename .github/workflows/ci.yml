name: CI

on:
  push:
    tags-ignore: ['**']

jobs:
  ci:
    name: Analyze, Test & Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup
        run: make setup

      - name: Analyze & Test
        run: make ci

      - name: Build iOS
        run: make build-ios
        continue-on-error: true

      - name: Build macOS
        run: make build-macos
        continue-on-error: true
