name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - 'deploy/**'
      - 'Dockerfile.web'
      - 'nginx.conf'
      - '.github/workflows/deploy-web.yml'
      - 'docs/**'

jobs:
  ci:
    name: Analyze, Test & Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup
        run: make setup

      - name: Analyze & Test
        run: make ci

      - name: Build iOS (no signing)
        run: flutter build ios --no-codesign

      - name: Build macOS (no signing)
        run: |
          flutter build macos --debug --config-only
          xcodebuild build \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
