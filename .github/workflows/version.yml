name: Version

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  version:
    name: Bump version & release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Get commit message
        id: commit
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          MSG=$(git log -1 --format='%s' "$HEAD_SHA")
          BODY=$(git log -1 --format='%b' "$HEAD_SHA")
          echo "message=$MSG" >> "$GITHUB_OUTPUT"
          echo "body<<BODY_DELIMITER_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "BODY_DELIMITER_EOF" >> "$GITHUB_OUTPUT"

      - name: Determine bump level
        id: bump
        shell: bash
        env:
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
          COMMIT_BODY: ${{ steps.commit.outputs.body }}
        run: |
          # Check for breaking change
          if echo "$COMMIT_BODY" | grep -qi "BREAKING CHANGE"; then
            echo "level=major" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract type from conventional commit prefix (ERE for POSIX portability)
          TYPE=$(echo "$COMMIT_MSG" | sed -En 's/^([a-z]+)(\([^)]*\))?!?:.*/\1/p')
          BANG=$(echo "$COMMIT_MSG" | sed -En 's/^[a-z]+(\([^)]*\))?(!)?.*/\2/p')

          if [[ "$BANG" == "!" ]]; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif [[ "$TYPE" == "feat" ]]; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new version
        id: version
        shell: bash
        env:
          BUMP_LEVEL: ${{ steps.bump.outputs.level }}
        run: |
          # Get latest tag or fall back to v1.0.0
          if LATEST=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null); then
            echo "Found latest tag: $LATEST"
          else
            LATEST="v1.0.0"
            echo "No tags found, using baseline: $LATEST"
          fi

          # Strip v prefix and split
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$BUMP_LEVEL" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "::error::Unknown bump level: '$BUMP_LEVEL'. Defaulting to patch."
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP_LEVEL — $LATEST -> $NEW_TAG"

      - name: Create tag and release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Guard: skip if this SHA is already tagged (e.g. manual CI re-run)
          if git describe --tags --exact-match "$SHA" 2>/dev/null; then
            echo "SHA $SHA is already tagged. Skipping release."
            exit 0
          fi
          git tag -a "$NEW_TAG" "$SHA" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
          gh release create "$NEW_TAG" \
            --target "$SHA" \
            --title "$NEW_TAG" \
            --generate-notes
